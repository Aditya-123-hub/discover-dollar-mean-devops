name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend image
        run: docker build -t kubeaditya957/mean-backend ./backend

      - name: Push backend image
        run: docker push kubeaditya957/mean-backend

      - name: Build frontend image
        run: docker build -t kubeaditya957/mean-frontend ./frontend

      - name: Push frontend image
        run: docker push kubeaditya957/mean-frontend